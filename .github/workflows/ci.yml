name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Type check
        run: uv run mypy src/open_scientist/ tests/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: open_scientist
          POSTGRES_PASSWORD: open_scientist_dev_password
          POSTGRES_DB: open_scientist
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U open_scientist -d open_scientist"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://open_scientist:open_scientist_dev_password@localhost:5434/open_scientist

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - name: Unit & Integration Tests
        run: uv run pytest --cov=src/open_scientist --cov-report=term-missing
