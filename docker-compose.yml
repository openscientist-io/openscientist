# Docker Compose for SHANDY
#
# Usage:
#   Development: docker compose up
#                (uses docker-compose.override.yml for source mounts)
#                Set SHANDY_DEV_MODE=true in .env for auto-reload & mock auth
#
#   Production:  docker compose -f docker-compose.yml up
#                (explicit file flag ignores override.yml)

services:
  postgres:
    image: postgres:18
    restart: ${SHANDY_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shandy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shandy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-shandy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Init script creates shandy_admin role for RLS bypass
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shandy} -d ${POSTGRES_DB:-shandy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  shandy:
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    platform: linux/amd64
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    # In dev mode, restart=no; in production, restart=unless-stopped
    restart: ${SHANDY_RESTART_POLICY:-unless-stopped}
    # Enable --reload in dev mode for live reloading
    command: ["python", "-m", "shandy.web_app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    environment:
      # Mode flag (controls reload, mock auth, etc.)
      SHANDY_DEV_MODE: ${SHANDY_DEV_MODE:-false}

      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shandy}:${POSTGRES_PASSWORD:-shandy_dev_password}@postgres:5432/${POSTGRES_DB:-shandy}
      # Admin database URL for RLS bypass (background tasks, skill sync, etc.)
      ADMIN_DATABASE_URL: postgresql+asyncpg://shandy_admin:${POSTGRES_PASSWORD:-shandy_dev_password}@postgres:5432/${POSTGRES_DB:-shandy}
      PORT: ${PORT:-8080}

      # Provider selection
      CLAUDE_PROVIDER: ${CLAUDE_PROVIDER:-cborg}

      # CBORG settings
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}

      # Direct Anthropic API (if using anthropic provider)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Vertex AI settings (if using Vertex provider)
      CLAUDE_CODE_USE_VERTEX: ${CLAUDE_CODE_USE_VERTEX}
      ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID}
      # GOOGLE_APPLICATION_CREDENTIALS is set in Dockerfile to /app/gcp-credentials.json
      # The file is mounted from GCP_CREDENTIALS_FILE (set in .env)
      # GCP_CREDENTIALS_HOST_PATH passes the host path for agent container mounts
      GCP_CREDENTIALS_HOST_PATH: ${GCP_CREDENTIALS_FILE:-}
      CLOUD_ML_REGION: ${CLOUD_ML_REGION}
      VERTEX_REGION_CLAUDE_4_5_SONNET: ${VERTEX_REGION_CLAUDE_4_5_SONNET}
      VERTEX_REGION_CLAUDE_4_5_HAIKU: ${VERTEX_REGION_CLAUDE_4_5_HAIKU}
      GCP_BILLING_ACCOUNT_ID: ${GCP_BILLING_ACCOUNT_ID}

      # AWS Bedrock settings (if using Bedrock provider)
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}

      # Model settings
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-${ANTHROPIC_SMALL_FAST_MODEL}}
      ANTHROPIC_SMALL_FAST_MODEL: ${ANTHROPIC_SMALL_FAST_MODEL:-${ANTHROPIC_DEFAULT_HAIKU_MODEL}}

      # Budget controls
      MAX_PROJECT_SPEND_TOTAL_USD: ${MAX_PROJECT_SPEND_TOTAL_USD}
      MAX_PROJECT_SPEND_24H_USD: ${MAX_PROJECT_SPEND_24H_USD}

      # App settings
      PHENIX_PATH: ${PHENIX_PATH:+/opt/phenix}
      STORAGE_SECRET: ${STORAGE_SECRET}

      # Security: OAuth token encryption
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}

      # Enable mock OAuth in dev mode (set explicitly to override)
      ENABLE_MOCK_AUTH: ${ENABLE_MOCK_AUTH:-${SHANDY_DEV_MODE:-false}}

      # Berkeley Lab Data Lakehouse
      KBASE_TOKEN: ${KBASE_TOKEN}
      DREMIO_USER: ${DREMIO_USER}
      DREMIO_PASSWORD: ${DREMIO_PASSWORD}

      # Container isolation for code execution (executor containers)
      SHANDY_USE_CONTAINER_ISOLATION: ${SHANDY_USE_CONTAINER_ISOLATION:-true}
      SHANDY_EXECUTOR_IMAGE: ${SHANDY_EXECUTOR_IMAGE:-shandy-executor:latest}
      SHANDY_EXECUTOR_MEMORY: ${SHANDY_EXECUTOR_MEMORY:-2g}
      SHANDY_EXECUTOR_CPU: ${SHANDY_EXECUTOR_CPU:-0.5}

      # Host path mapping for executor container volume mounts
      SHANDY_HOST_PROJECT_DIR: ${SHANDY_HOST_PROJECT_DIR:-}

      # Prevent .pyc files in dev mode
      PYTHONDONTWRITEBYTECODE: ${SHANDY_DEV_MODE:+1}

    volumes:
      - ./jobs:/app/jobs
      - ./data:/app/data
      - ./src:/app/src  # Mount source for live reload in dev mode

      # Mount GCP credentials if using Vertex AI (set GCP_CREDENTIALS_FILE in .env)
      - ${GCP_CREDENTIALS_FILE:-/dev/null}:/app/gcp-credentials.json:ro

      # Mount Phenix installation if available (set PHENIX_PATH in .env)
      - ${PHENIX_PATH:-/dev/null}:/opt/phenix:ro

      # Mount built-in skills directory
      - ./skills:/app/skills:ro

      # Mount Docker socket for sibling container execution
      - /var/run/docker.sock:/var/run/docker.sock:ro

    group_add:
      - "${DOCKER_GID:-999}"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "shandy.mode=${SHANDY_DEV_MODE:-production}"

volumes:
  postgres_data:
