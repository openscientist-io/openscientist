# Docker Compose for SHANDY
#
# Usage:
#   Development: docker compose up
#                (uses docker-compose.override.yml for source mounts)
#                Set SHANDY_DEV_MODE=true in .env for auto-reload & mock auth
#
#   Production:  docker compose -f docker-compose.yml up
#                (explicit file flag ignores override.yml)

services:
  postgres:
    image: postgres:18
    restart: ${SHANDY_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shandy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shandy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-shandy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Init script creates shandy_admin role for RLS bypass
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shandy} -d ${POSTGRES_DB:-shandy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  shandy:
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    platform: linux/amd64
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    # In dev mode, restart=no; in production, restart=unless-stopped
    restart: ${SHANDY_RESTART_POLICY:-unless-stopped}
    # All credentials and settings come from .env (ANTHROPIC_API_KEY, CLAUDE_PROVIDER, etc.)
    env_file:
      - path: .env
        required: false
    environment:
      # Database URLs use the 'postgres' service hostname — must override any .env value
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shandy}:${POSTGRES_PASSWORD:-shandy_dev_password}@postgres:5432/${POSTGRES_DB:-shandy}
      ADMIN_DATABASE_URL: postgresql+asyncpg://shandy_admin:${POSTGRES_PASSWORD:-shandy_dev_password}@postgres:5432/${POSTGRES_DB:-shandy}
      PORT: ${PORT:-8080}

      # Phenix: host path (from .env) is mounted at /opt/phenix inside the container
      PHENIX_PATH: ${PHENIX_PATH:+/opt/phenix}

      # GCP credentials: the host file path is passed separately so agent containers
      # can mount it on the host side (GOOGLE_APPLICATION_CREDENTIALS is set in Dockerfile)
      GCP_CREDENTIALS_HOST_PATH: ${GCP_CREDENTIALS_FILE:-}

      # Container isolation defaults
      SHANDY_USE_CONTAINER_ISOLATION: ${SHANDY_USE_CONTAINER_ISOLATION:-true}
      SHANDY_EXECUTOR_IMAGE: ${SHANDY_EXECUTOR_IMAGE:-shandy-executor:latest}
      SHANDY_EXECUTOR_MEMORY: ${SHANDY_EXECUTOR_MEMORY:-2g}
      SHANDY_EXECUTOR_CPU: ${SHANDY_EXECUTOR_CPU:-0.5}
      SHANDY_AGENT_MEMORY: ${SHANDY_AGENT_MEMORY:-8g}
      SHANDY_AGENT_CPU: ${SHANDY_AGENT_CPU:-2.0}
      SHANDY_HOST_PROJECT_DIR: ${SHANDY_HOST_PROJECT_DIR:-}

      # Derived settings not expressible in .env
      PYTHONDONTWRITEBYTECODE: ${SHANDY_DEV_MODE:+1}

    volumes:
      - ./jobs:/app/jobs
      - ./data:/app/data
      - ./src:/app/src  # Mount source for live reload in dev mode

      # Mount GCP credentials if using Vertex AI (set GCP_CREDENTIALS_FILE in .env)
      - ${GCP_CREDENTIALS_FILE:-/dev/null}:/app/gcp-credentials.json:ro

      # Mount Phenix installation if available (set PHENIX_PATH in .env)
      - ${PHENIX_PATH:-/dev/null}:/opt/phenix:ro

      # Mount built-in skills directory
      - ./skills:/app/skills:ro

      # Mount Docker socket for sibling container execution
      - /var/run/docker.sock:/var/run/docker.sock:ro

    group_add:
      - "${DOCKER_GID:-999}"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "shandy.mode=${SHANDY_DEV_MODE:-production}"

  # shandy-agent: build-only service — never started by compose.
  # Agent containers are spawned at runtime by JobContainerRunner.
  # Build with:  docker compose build shandy-agent
  #          or  docker build -f Dockerfile.agent -t shandy-agent:latest .
  shandy-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: shandy-agent:latest
    profiles: ["build-only"]  # Excluded from `docker compose up`
    entrypoint: ["echo", "shandy-agent image built"]

networks:
  default:
    name: shandy_default

volumes:
  postgres_data:
