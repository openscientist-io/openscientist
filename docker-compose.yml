# Docker Compose for SHANDY

services:
  shandy:
    platform: linux/amd64
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ${PORT:-8080}

      # Provider selection
      CLAUDE_PROVIDER: ${CLAUDE_PROVIDER:-cborg}

      # CBORG settings
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL}

      # Direct Anthropic API (if using anthropic provider)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # Vertex AI settings (if using Vertex provider)
      CLAUDE_CODE_USE_VERTEX: ${CLAUDE_CODE_USE_VERTEX}
      ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/app/gcp-credentials.json}
      CLOUD_ML_REGION: ${CLOUD_ML_REGION}
      VERTEX_REGION_CLAUDE_4_5_SONNET: ${VERTEX_REGION_CLAUDE_4_5_SONNET}
      VERTEX_REGION_CLAUDE_4_5_HAIKU: ${VERTEX_REGION_CLAUDE_4_5_HAIKU}
      GCP_BILLING_ACCOUNT_ID: ${GCP_BILLING_ACCOUNT_ID}

      # AWS Bedrock settings (if using Bedrock provider)
      CLAUDE_CODE_USE_BEDROCK: ${CLAUDE_CODE_USE_BEDROCK}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK}

      # Azure Foundry settings (if using Foundry provider)
      CLAUDE_CODE_USE_FOUNDRY: ${CLAUDE_CODE_USE_FOUNDRY}
      ANTHROPIC_FOUNDRY_RESOURCE: ${ANTHROPIC_FOUNDRY_RESOURCE}
      ANTHROPIC_FOUNDRY_API_KEY: ${ANTHROPIC_FOUNDRY_API_KEY}
      ANTHROPIC_FOUNDRY_BASE_URL: ${ANTHROPIC_FOUNDRY_BASE_URL}

      # Model settings
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-${ANTHROPIC_SMALL_FAST_MODEL}}
      ANTHROPIC_SMALL_FAST_MODEL: ${ANTHROPIC_SMALL_FAST_MODEL:-${ANTHROPIC_DEFAULT_HAIKU_MODEL}}

      # Budget controls
      MAX_PROJECT_SPEND_TOTAL_USD: ${MAX_PROJECT_SPEND_TOTAL_USD}
      MAX_PROJECT_SPEND_24H_USD: ${MAX_PROJECT_SPEND_24H_USD}

      # App settings
      DISABLE_AUTH: ${DISABLE_AUTH}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      PHENIX_PATH: ${PHENIX_PATH:-}
      STORAGE_SECRET: ${STORAGE_SECRET}

      # Berkeley Lab Data Lakehouse
      KBASE_TOKEN: ${KBASE_TOKEN}
      DREMIO_USER: ${DREMIO_USER}
      DREMIO_PASSWORD: ${DREMIO_PASSWORD}
    volumes:
      - ./jobs:/app/jobs
      - ./data:/app/data
      - ./.env:/app/.env:ro
      # Mount GCP credentials if using Vertex AI (set GCP_CREDENTIALS_FILE in .env)
      - ${GCP_CREDENTIALS_FILE:-/dev/null}:/app/gcp-credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
