# Docker Compose override for development mode
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    # Expose postgres port to host for direct access during development
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  shandy:
    # Override command to enable NiceGUI auto-reload
    command: ["python", "-m", "shandy.web_app", "--host", "0.0.0.0", "--port", "8080", "--reload"]

    # Add source code mounting (extends volumes from base docker-compose.yml)
    volumes:
      # Mount source directory for live editing - changes trigger auto-reload
      - ./src:/app/src

      # Also mount Claude configuration for prompt development
      - ./.claude:/app/.claude
      - ./CLAUDE.md:/app/CLAUDE.md

    # Development-specific environment
    environment:
      # Prevent Python from writing .pyc files
      PYTHONDONTWRITEBYTECODE: "1"
      # Enable dev mode for mock OAuth login
      SHANDY_DEV_MODE: "true"

      # Enable mock OAuth for testing (DEVELOPMENT ONLY!)
      ENABLE_MOCK_AUTH: "true"

      # Disable container isolation in dev mode (use in-process execution)
      SHANDY_USE_CONTAINER_ISOLATION: "false"

    # Override restart policy - don't auto-restart in dev mode
    restart: "no"

    # Add labels for identification
    labels:
      - "shandy.mode=development"
      - "shandy.auto-reload=enabled"
