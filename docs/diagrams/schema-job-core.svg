<use href="#icon-share" x="292" y="79" width="14" height="14" fill="#212121"/>
<text x="310" y="90" font-size="12" fill="#212121" text-anchor="start" font-weight="600">JOB_SHARES</text>
<text x="578" y="90" font-size="9" fill="#43A047" text-anchor="end" font-weight="600">RLS</text>
<line x1="282" y1="100" x2="588" y2="100" stroke="#E0E0E0" stroke-width="1"/>
<text x="296" y="114" font-size="10" fill="#212121" text-anchor="start">🔑</text>
<text x="314" y="114" font-size="10" fill="#212121" text-anchor="start">id: UUID</text>
<use href="#icon-briefcase" x="294" y="122" width="12" height="12" fill="#616161"/>
<text x="314" y="132" font-size="10" fill="#212121" text-anchor="start">job_id: UUID → jobs.id  [I]</text>
<use href="#icon-user" x="294" y="140" width="12" height="12" fill="#616161"/>
<text x="314" y="150" font-size="10" fill="#212121" text-anchor="start">shared_with_user_id: UUID → users.id  [I]</text>
<text x="314" y="168" font-size="10" fill="#212121" text-anchor="start">created_at: TIMESTAMP</text>
<text x="314" y="186" font-size="10" fill="#212121" text-anchor="start">permission_level: VARCHAR(10)</text>
<text x="314" y="204" font-size="10" fill="#212121" text-anchor="start">updated_at: TIMESTAMP</text>
<line x1="290" y1="222" x2="580" y2="222" stroke="#E0E0E0" stroke-width="1"/>
<text x="296" y="234" font-size="9" fill="#616161" text-anchor="start">⚡ shared_with_user_id</text>
<text x="296" y="249" font-size="9" fill="#616161" text-anchor="start">⚡ job_id</text>
<text x="296" y="264" font-size="9" fill="#616161" text-anchor="start">✓ (job_id, shared_with_user_id)</text>
<text x="296" y="279" font-size="9" fill="#616161" text-anchor="start">⚙️ permission_level IN (&#x27;view&#x27;, &#x27;edit&#x27;)</text>
<rect x="50" y="185" width="180" height="36" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="1" rx="4" opacity="0.65"/>
<text x="140" y="207" font-size="11" fill="#616161" text-anchor="middle" font-style="italic">USERS</text>
<line x1="40" y1="702" x2="610" y2="702" stroke="#E0E0E0" stroke-width="1"/>
<rect x="40" y="720" width="570" height="24" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" rx="4"/>
<text x="52" y="736" font-size="9" fill="#616161" text-anchor="start">━ CASCADE     ╌ ╌ SET NULL     🔑 PK     ● FK (target table icon)     [U] Unique     [I] Indexed     RLS = Row-Level Security</text>
<text x="40" y="760" font-size="9" fill="#616161" text-anchor="start" font-weight="600">Table icons:</text>
<use href="#icon-briefcase" x="118" y="751" width="12" height="12" fill="#616161"/>
<text x="134" y="760" font-size="9" fill="#616161" text-anchor="start">jobs</text>
<use href="#icon-share" x="174" y="751" width="12" height="12" fill="#616161"/>
<text x="190" y="760" font-size="9" fill="#616161" text-anchor="start">job shares</text>
<text x="40" y="778" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Overview</text>
<text x="52" y="794" font-size="9" fill="#616161" text-anchor="start">The core work-unit model. A job represents a complete crystallographic analysis workflow — from data upload through iterative AI</text>
<text x="52" y="808" font-size="9" fill="#616161" text-anchor="start">reasoning to a final report. Sharing allows collaborative review without duplicating data.</text>
<text x="40" y="836" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Tables</text>
<use href="#icon-briefcase" x="40" y="845" width="12" height="12" fill="#616161"/>
<text x="60" y="854" font-size="9" fill="#212121" text-anchor="start" font-weight="600">JOBS</text>
<text x="60" y="868" font-size="9" fill="#616161" text-anchor="start">Central work unit tracking status (pending / running / completed / failed / cancelled), iteration progress, LLM provider selection</text>
<text x="60" y="882" font-size="9" fill="#616161" text-anchor="start">and scientific metadata such as PDB code and space group. All child tables reference this row.</text>
<use href="#icon-share" x="40" y="893" width="12" height="12" fill="#616161"/>
<text x="60" y="902" font-size="9" fill="#212121" text-anchor="start" font-weight="600">JOB_SHARES</text>
<text x="60" y="916" font-size="9" fill="#616161" text-anchor="start">Grants another user view or edit access to a job. This enables collaborative analysis while RLS policies ensure each user only</text>
<text x="60" y="930" font-size="9" fill="#616161" text-anchor="start">sees jobs they own or have been explicitly invited to.</text>
<text x="40" y="958" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Row-Level Security</text>
<text x="52" y="974" font-size="9" fill="#616161" text-anchor="start">Job owners have unrestricted access. Other users may view a job if they hold a share record and may edit only if the share specifies</text>
<text x="52" y="988" font-size="9" fill="#616161" text-anchor="start">edit permission. Orphaned jobs (owner deleted, owner_id IS NULL) remain visible to all authenticated users to prevent data loss.</text>
<line x1="40" y1="1020" x2="610" y2="1020" stroke="#E0E0E0" stroke-width="1"/>
<text x="-112" y="1036" font-size="9" fill="#9E9E9E" text-anchor="start">See also:</text>
