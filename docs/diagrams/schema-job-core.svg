<text x="185" y="382" font-size="10" fill="#212121" text-anchor="start">created_at: TIMESTAMP</text>
<text x="185" y="400" font-size="10" fill="#212121" text-anchor="start">current_iteration: INTEGER</text>
<text x="185" y="418" font-size="10" fill="#212121" text-anchor="start">description: TEXT</text>
<text x="185" y="436" font-size="10" fill="#212121" text-anchor="start">error_message: TEXT</text>
<text x="185" y="454" font-size="10" fill="#212121" text-anchor="start">llm_config: JSONB</text>
<text x="185" y="472" font-size="10" fill="#212121" text-anchor="start">llm_provider: VARCHAR(50)</text>
<text x="185" y="490" font-size="10" fill="#212121" text-anchor="start">max_iterations: INTEGER</text>
<text x="185" y="508" font-size="10" fill="#212121" text-anchor="start">pdb_code: VARCHAR(10)</text>
<text x="185" y="526" font-size="10" fill="#212121" text-anchor="start">result_summary: TEXT</text>
<text x="185" y="544" font-size="10" fill="#212121" text-anchor="start">resume_iteration: INTEGER</text>
<text x="185" y="562" font-size="10" fill="#212121" text-anchor="start">space_group: VARCHAR(50)</text>
<text x="185" y="580" font-size="10" fill="#212121" text-anchor="start">status: VARCHAR(50)  [I]</text>
<text x="185" y="598" font-size="10" fill="#212121" text-anchor="start">title: VARCHAR(255)</text>
<text x="185" y="616" font-size="10" fill="#212121" text-anchor="start">updated_at: TIMESTAMP</text>
