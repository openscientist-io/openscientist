<text x="40" y="858" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Overview</text>
<text x="52" y="874" font-size="9" fill="#616161" text-anchor="start">Identity and credential management for every person who interacts with SHANDY. Users sign in through OAuth providers, receive a browser session, and may optionally create API keys for</text>
<text x="52" y="888" font-size="9" fill="#616161" text-anchor="start">programmatic access.</text>
<text x="40" y="916" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Tables</text>
<use href="#icon-user" x="40" y="925" width="12" height="12" fill="#616161"/>
<text x="60" y="934" font-size="9" fill="#212121" text-anchor="start" font-weight="600">USERS</text>
<text x="60" y="948" font-size="9" fill="#616161" text-anchor="start">Central identity record. Stores display name, email and active status. Every authorisation decision in the system ultimately traces back to a row in this table.</text>
<use href="#icon-shield" x="40" y="959" width="12" height="12" fill="#616161"/>
<text x="60" y="968" font-size="9" fill="#212121" text-anchor="start" font-weight="600">OAUTH_ACCOUNTS</text>
<text x="60" y="982" font-size="9" fill="#616161" text-anchor="start">Links a user to an external identity provider (GitHub, Google). A single user may connect several providers. Access and refresh tokens are stored here and rotated transparently on each login.</text>
<use href="#icon-clock" x="40" y="993" width="12" height="12" fill="#616161"/>
<text x="60" y="1002" font-size="9" fill="#212121" text-anchor="start" font-weight="600">SESSIONS</text>
<text x="60" y="1016" font-size="9" fill="#616161" text-anchor="start">Represents an active browser session created after a successful OAuth handshake. Sessions carry a TTL, the originating IP address and user-agent string for audit purposes.</text>
<use href="#icon-key" x="40" y="1027" width="12" height="12" fill="#616161"/>
<text x="60" y="1036" font-size="9" fill="#212121" text-anchor="start" font-weight="600">API_KEYS</text>
<text x="60" y="1050" font-size="9" fill="#616161" text-anchor="start">Enables programmatic (non-browser) access. The raw secret is shown exactly once at creation; only a bcrypt hash is persisted. Keys can be individually revoked without affecting other</text>
<text x="60" y="1064" font-size="9" fill="#616161" text-anchor="start">credentials.</text>
<text x="40" y="1092" font-size="11" fill="#212121" text-anchor="start" font-weight="600">Row-Level Security</text>
<text x="52" y="1108" font-size="9" fill="#616161" text-anchor="start">Every user can only read and modify their own identity row. OAuth accounts, sessions and API keys are likewise restricted to their owning user. Access is governed by the PostgreSQL session</text>
<text x="52" y="1122" font-size="9" fill="#616161" text-anchor="start">variable app.current_user_id, which the application sets on every request.</text>
<line x1="40" y1="1154" x2="872" y2="1154" stroke="#E0E0E0" stroke-width="1"/>
<text x="184" y="1170" font-size="9" fill="#9E9E9E" text-anchor="start">See also:</text>
