<text x="266" y="1170" font-size="9" fill="#9E9E9E" text-anchor="start">Job Core &amp; Sharing (schema-job-core)</text>
<text x="478" y="1170" font-size="9" fill="#9E9E9E" text-anchor="start">·</text>
