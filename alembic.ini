# Alembic configuration for OpenScientist database migrations

[alembic]
# Path to migration scripts
script_location = src/openscientist/database/migrations

# Template used to generate migration files
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps (default: local)
timezone = UTC

# Truncate long migration scripts in output
truncate_slug_length = 40

# Patterns for auto-generating migrations
# Use sqlalchemy.url from env.py (DATABASE_URL environment variable)
# sqlalchemy.url is set programmatically in env.py

# Output encoding used when revision files are written
output_encoding = utf-8

# Version locations for migration scripts
# Default is 'script_location/versions'
# Can specify multiple locations separated by spaces
# version_locations = %(here)s/bar:%(here)s/bat:src/openscientist/database/migrations/versions

# Version path separator (os.pathsep will use platform-specific separator)
# version_path_separator = :
# version_path_separator = ;

[post_write_hooks]
# Post-write hooks to format and lint generated migration files
# Uncomment and customize as needed

# hooks = ruff_format
# ruff_format.type = console_scripts
# ruff_format.entrypoint = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
